name: Update MarketPulse Data

on:
  workflow_dispatch:
  schedule:
    # Runs Monday-Friday at 10:30 PM UTC.
    # This is after US market close and gives Yahoo/yfinance time to publish daily candles.
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: marketpulse-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live data pipeline
        run: |
          bash scripts/run_live_data_pipeline.sh

      - name: Show public data freshness
        run: |
          python - <<'PY'
          import pandas as pd

          future = pd.read_csv("public/data/marketpulse_dashboard_future_forecast_wide.csv")
          company = pd.read_csv("public/data/marketpulse_dashboard_company_summary.csv")

          print("Company symbols:", company["symbol"].nunique())
          print("Future rows:", len(future))
          print("Future latest_date min:", future["latest_date"].min())
          print("Future latest_date max:", future["latest_date"].max())
          PY

      - name: Commit and push updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/*.csv

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Update MarketPulse data $(date -u +'%Y-%m-%d')"
            git push
          fi
